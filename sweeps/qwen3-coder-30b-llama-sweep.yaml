name: qwen3-coder-30b-llama-sweep

database: results/llm_refinery.duckdb

commands:
  bench: ["llama", "bench"]
  server: ["llama", "server"]

models:
  - name: qwen3-coder-30b-a3b-q4-k-m
    hf: lmstudio-community/Qwen3-Coder-30B-A3B-Instruct-GGUF
    params:
      hff: Qwen3-Coder-30B-A3B-Instruct-Q4_K_M.gguf

defaults:
  cache_type_k: q8_0
  cache_type_v: q8_0
  batch_size: 512
  ubatch_size: 512
  threads: 4
  poll: 0

bench:
  prompt_tokens: [512, 2048]
  gen_tokens: [128, 512]
  repetitions: 3
  output: json
  params:
    n_gpu_layers: 99
    flash_attn: 1
  extra_args: []

server:
  params:
    ctx_size: 8192
    n_gpu_layers: all
    flash_attn: auto
    no_mmproj: true
    reasoning: "off"
    reasoning_format: deepseek
    parallel: 1
    perf: true
  extra_args: []
  env: {}
