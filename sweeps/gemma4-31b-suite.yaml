name: gemma4-31b-suite

database: results/llm_refinery.duckdb

endpoint:
  name: ollama-gemma4-31b
  protocol: openai_chat
  base_url: http://127.0.0.1:11434/v1
  model: gemma4:31b

quality:
  enabled: true
  tasks: ifeval,gsm8k
  limit: 50
  # IFEval has num_fewshot fixed to 0 in the task config; this restores
  # GSM8K's standard 5-shot prompt so strict/flexible extraction work.
  num_fewshot: 5
  eos_string: "<end_of_turn>"
  max_length: 16384
  # Reasoning models spend part of this budget in hidden reasoning.
  gen_kwargs: '{"max_gen_toks": 4096}'

http_load:
  enabled: true
  config: gemma4-31b-ollama-http-load.yaml
  targets: [ollama-gemma4-31b]

preflight:
  enabled: true
  require_clean: true
  sanity_check: true
