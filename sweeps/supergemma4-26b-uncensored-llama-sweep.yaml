name: supergemma4-26b-uncensored-llama-sweep

database: results/llm_refinery.duckdb

commands:
  bench: ["llama", "bench"]
  server: ["llama", "server"]

models:
  - name: supergemma4-26b-uncensored-q4km
    hf: Jiunsong/supergemma4-26b-uncensored-gguf-v2
    params:
      hff: supergemma4-26b-uncensored-fast-v2-Q4_K_M.gguf

defaults:
  cache_type_k: q8_0
  cache_type_v: q8_0
  batch_size: 512
  ubatch_size: 512
  threads: 4
  poll: 0

bench:
  prompt_tokens: [512, 2048]
  gen_tokens: [128, 512]
  repetitions: 3
  output: json
  params:
    n_gpu_layers: 99
    flash_attn: 1
  extra_args: []

server:
  params:
    ctx_size: 8192
    n_gpu_layers: all
    flash_attn: auto
    no_mmproj: true
    reasoning: "off"
    parallel: 1
    perf: true
    fit: "off"
    cache_ram: 8192
    ctx_checkpoints: 32
    checkpoint_min_step: 256
  extra_args: []
  env: {}
