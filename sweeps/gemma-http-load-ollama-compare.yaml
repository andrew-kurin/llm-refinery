name: gemma-http-load-ollama-compare

database: results/llama_tune.duckdb

# Start the llama.cpp server in another terminal first, for example:
#   uv run llama-tune server sweeps/gemma-f16-kv-batch-neighborhood.yaml --index 0
#
# Also ensure Ollama is running and the model name below exists:
#   ollama serve
#   ollama list
targets:
  - name: llama-f16-kv
    provider: openai
    base_url: http://127.0.0.1:8080/v1
    # llama.cpp server usually accepts any model string for the local model.
    model: local-model

  - name: ollama-gemma
    provider: ollama
    base_url: http://127.0.0.1:11434
    model: gemma4:26b

  - name: mlx-gemma-e4b-optiq
    provider: openai
    base_url: http://127.0.0.1:8081/v1
    model: mlx-community/gemma-4-e4b-it-OptiQ-4bit

  - name: mlx-gemma-26b-optiq
    provider: openai
    base_url: http://127.0.0.1:8082/v1
    model: mlx-community/gemma-4-26B-A4B-it-OptiQ-4bit

scenarios:
  - name: interactive-short
    system: You are concise, accurate, and practical.
    prompt: |
      Explain the tradeoff between f16 KV cache and q8_0 KV cache for a local LLM server.
      Give a recommendation for a user who prefers quality over raw speed.
    max_tokens: [128]
    concurrency: [1, 2, 4]
    requests: 12
    warmup_requests: 1
    temperature: 0
    seed: 42
    stream: true
    timeout_s: 300

  - name: coding-assistant
    system: You are a careful coding assistant. Prefer simple, maintainable code.
    prompt: |
      Write a small Python function named percentile(values, p) that returns the pth percentile
      using linear interpolation. Include only the function and a minimal docstring.
    max_tokens: [512]
    concurrency: [1, 2]
    requests: 6
    warmup_requests: 1
    temperature: 0
    seed: 42
    stream: true
    timeout_s: 600
    expected_contains: ["def percentile"]

  - name: long-context-recall
    system: Answer using only the information in the user message.
    prompt: |
      Reference note: the deployment codename is ZEBRA-42. The selected server settings are
      f16 key cache, f16 value cache, batch size 512, micro-batch size 512, flash attention on,
      threads 4, and poll 0.

      After reading all repeated notes, answer with exactly two lines:
      codename: <codename>
      settings: <cache and batch settings>
    prompt_repeat: 64
    max_tokens: [128]
    concurrency: [1]
    requests: 3
    warmup_requests: 1
    temperature: 0
    seed: 42
    stream: true
    timeout_s: 900
    expected_contains: ["ZEBRA-42", "f16", "512"]
