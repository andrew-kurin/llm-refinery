name: qwen36-27b-llama-sweep

database: results/llm_refinery.duckdb

commands:
  bench: ["llama", "bench"]
  server: ["llama", "server"]

models:
  # Compact first pass. Good chance of fitting comfortably on 32 GB.
  - name: qwen36-27b-iq4-nl
    hf: unsloth/Qwen3.6-27B-GGUF
    params:
      hff: Qwen3.6-27B-IQ4_NL.gguf

  # Standard llama.cpp 4-bit baseline.
  - name: qwen36-27b-q4-k-m
    hf: unsloth/Qwen3.6-27B-GGUF
    params:
      hff: Qwen3.6-27B-Q4_K_M.gguf

  # Quality-focused Unsloth dynamic quant, analogous to the Gemma UD-Q4_K_XL winner.
  - name: qwen36-27b-ud-q4-k-xl
    hf: unsloth/Qwen3.6-27B-GGUF
    params:
      hff: Qwen3.6-27B-UD-Q4_K_XL.gguf

defaults:
  cache_type_k: q8_0
  cache_type_v: q8_0
  batch_size: 512
  ubatch_size: 512
  threads: 4
  poll: 0

bench:
  prompt_tokens: [512, 2048]
  gen_tokens: [128, 512]
  repetitions: 3
  output: json
  params:
    n_gpu_layers: 99
    flash_attn: 1
  extra_args: []

server:
  params:
    ctx_size: 8192
    n_gpu_layers: all
    flash_attn: auto
    no_mmproj: true
    reasoning: "off"
    # Extract <think>...</think> out of message.content. With `none`, Qwen can return
    # an empty visible think block that hurts strict instruction-following evals.
    reasoning_format: deepseek
    parallel: 1
    perf: true
  extra_args: []
  env: {}
