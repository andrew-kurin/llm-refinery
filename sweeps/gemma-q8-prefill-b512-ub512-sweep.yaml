name: gemma-q8-prefill-b512-ub512-sweep

database: results/llm_refinery.duckdb

commands:
  bench: ["llama", "bench"]
  server: ["llama", "server"]

models:
  - name: gemma-4-26b-a4b-q4km
    hf: ggml-org/gemma-4-26B-A4B-it-GGUF:Q4_K_M

# High-value prefill sweep:
# - keep q8_0/q8_0 for KV quality
# - keep batch_size fixed at 512 based on current promising results
# - keep ubatch_size fixed at 512 based on current promising results
# - use long prompt sizes to exercise prefill and 16k-context behavior
sweep:
  cache_type_k: [q8_0]
  cache_type_v: [q8_0]
  batch_size: [512]
  ubatch_size: [512]

bench:
  prompt_tokens: [512, 2048, 8192, 16384]
  # llama-bench reports prompt processing and generation as separate rows.
  # Keep generation tiny so this sweep mostly measures prefill.
  gen_tokens: [16]
  repetitions: 3
  output: json
  params:
    n_gpu_layers: 99
    flash_attn: 1
  extra_args: []

server:
  params:
    ctx_size: 16384
    n_gpu_layers: all
    flash_attn: auto
    mlock: true
    parallel: 1
    perf: true
  extra_args: []
  env: {}
