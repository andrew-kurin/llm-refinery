name: gemma4-12b-unsloth-q8-mtp-llama-sweep

database: results/llm_refinery.duckdb

commands:
  bench: ["llama", "bench"]
  server: ["llama", "server"]

models:
  - name: gemma4-12b-unsloth-q8-mtp-n2-q8kv
    hf: unsloth/gemma-4-12B-it-GGUF
    params:
      hff: gemma-4-12b-it-Q8_0.gguf

defaults:
  cache_type_k: q8_0
  cache_type_v: q8_0
  batch_size: 512
  ubatch_size: 512
  threads: 4
  poll: 0

bench:
  prompt_tokens: [512, 2048]
  gen_tokens: [128, 512]
  repetitions: 3
  output: json
  params:
    n_gpu_layers: 99
    flash_attn: 1
  extra_args: []

server:
  params:
    ctx_size: 8192
    n_gpu_layers: all
    flash_attn: auto
    no_mmproj: true
    reasoning: "off"
    parallel: 1
    perf: true
    fit: "off"
    cache_ram: 0
    ctx_checkpoints: 0
    spec_type: draft-mtp
    spec_draft_n_max: 2
    spec_draft_ngl: all
    spec_draft_type_k: q8_0
    spec_draft_type_v: q8_0
    mtp_head:
      hf: unsloth/gemma-4-12B-it-GGUF
      file: MTP/gemma-4-12B-it-MTP-Q8_0.gguf
  extra_args: []
  env: {}

eval:
  tasks: ifeval,gsm8k
  limit: 50
  max_length: 8192
  eos_string: "<turn|>"
