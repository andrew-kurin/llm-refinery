name: gemma-q8-b512-ub512-runtime-triage

database: results/llm_refinery.duckdb

commands:
  bench: ["llama", "bench"]
  server: ["llama", "server"]

models:
  - name: gemma-4-26b-a4b-q4km
    hf: ggml-org/gemma-4-26B-A4B-it-GGUF:Q4_K_M

# Compact high-value sweep after deciding to keep q8 KV and 512/512 batch sizing.
# Focuses on backend/runtime knobs that can affect Metal prefill and decode.
sweep:
  cache_type_k: [q8_0]
  cache_type_v: [q8_0]
  batch_size: [512]
  ubatch_size: [512]
  flash_attn: [1]
  threads: [4, 8]
  poll: [0, 50, 100]

bench:
  # Two scenarios: normal-ish long prompt and full 16k-context prefill.
  prompt_tokens: [2048, 16384]
  # Keep generation short so this mostly tests prompt processing/prefill.
  gen_tokens: [16]
  repetitions: 3
  output: json
  params:
    n_gpu_layers: 99
  extra_args: []

server:
  # Server parity for the candidate settings. For server, keep flash_attn on auto.
  params:
    ctx_size: 16384
    n_gpu_layers: all
    flash_attn: auto
    mlock: true
    parallel: 1
    perf: true
  extra_args: []
  env: {}
