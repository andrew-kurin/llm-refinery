name: qwen36-http-load

database: results/llm_refinery.duckdb

targets:
  - name: llama-qwen36-35b-a3b-ud-iq4-nl
    provider: openai
    base_url: http://127.0.0.1:8080/v1
    model: local-model

  - name: llama-qwen36-35b-a3b-ud-q4-k-m
    provider: openai
    base_url: http://127.0.0.1:8080/v1
    model: local-model

scenarios:
  - name: interactive-short
    system: You are concise, accurate, and practical.
    prompt: |
      Explain the tradeoff between f16 KV cache and q8_0 KV cache for a local LLM server.
      Give a recommendation for a user who prefers quality over raw speed.
    max_tokens: [128]
    concurrency: [1]
    requests: 12
    warmup_requests: 1
    temperature: 0
    seed: 42
    stream: true
    timeout_s: 300

  - name: coding-assistant
    system: You are a careful coding assistant. Prefer simple, maintainable code.
    prompt: |
      Write a small Python function named percentile(values, p) that returns the pth percentile
      using linear interpolation. Include only the function and a minimal docstring.
    max_tokens: [512]
    concurrency: [1]
    requests: 6
    warmup_requests: 1
    temperature: 0
    seed: 42
    stream: true
    timeout_s: 600
    expected_contains: ["def percentile"]

  - name: long-context-recall
    system: Answer using only the information in the user message.
    prompt: |
      Reference note: the deployment codename is QWEN36-35B. The selected server settings are
      q8_0 key cache, q8_0 value cache, batch size 512, micro-batch size 512, flash attention on,
      threads 4, and poll 0.

      After reading all repeated notes, answer with exactly two lines:
      codename: <codename>
      settings: <cache and batch settings>
    prompt_repeat: 64
    max_tokens: [128]
    concurrency: [1]
    requests: 3
    warmup_requests: 1
    temperature: 0
    seed: 42
    stream: true
    timeout_s: 900
    expected_contains: ["QWEN36-35B", "q8_0", "512"]
