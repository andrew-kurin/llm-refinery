name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python 3.10 probe runtime
        run: |
          uv python install 3.10
          echo "LLM_REFINERY_PYTHON_310=$(uv python find --no-project 3.10)" >> "$GITHUB_ENV"
      - name: Install
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check src tests
      - name: Type check
        run: uv run mypy
      - name: Test
        run: uv run pytest -q
